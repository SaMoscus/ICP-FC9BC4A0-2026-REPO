services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: icp-project2-static-web:latest
    container_name: icp-project2-web
    ports:
      - "8080:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
